name: Build

# Builds the example against the plugin source via composite build.
# Once the plugin is published to the Gradle Plugin Portal, the plugin checkout
# steps below can be removed and this workflow becomes a standalone portal consumer.
# For template forks that only use the published plugin, delete the checkout steps
# and use the portal directly.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      plugin-ref:
        description: "Plugin branch/tag to test against (default: main)"
        default: main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEVELOCITY_PUBLISH: "1"
    steps:
      # TEMPLATE FORK: remove `path: example` once the plugin checkout steps below are deleted
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: example

      # TEMPLATE FORK: remove these two steps (plugin ref resolution and plugin source checkout)
      - name: Resolve plugin ref
        id: plugin-ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.plugin-ref }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.head_ref || github.ref_name }}" = "the-phoenix-project" ]; then
            echo "ref=the-phoenix-project" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-libraries-gradle-plugin
          ref: ${{ steps.plugin-ref.outputs.ref }}
          path: jenkins-pipeline-shared-libraries-gradle-plugin
      # TEMPLATE FORK: end of steps to remove

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      # TEMPLATE FORK: remove `working-directory` once plugin checkout steps are deleted
      - name: Build
        working-directory: example
        run: ./gradlew build --continue
