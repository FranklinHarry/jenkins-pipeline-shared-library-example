name: Compatibility build

# Tests this example repo against a specific plugin source branch via composite build.
# Used for coordinated plugin + example development.
#
# NOTE FOR TEMPLATE FORKS: you do not need this workflow.
# Delete it and use build.yml instead, which resolves the published plugin from the
# Gradle Plugin Portal without requiring a plugin source checkout.
# Keep this file only if you are developing the plugin itself alongside the example.

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      plugin-ref:
        description: "Plugin branch/tag to test against (default: main)"
        default: main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Java ${{ matrix.java }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEVELOCITY_PUBLISH: "1"
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21, 25]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: example

      # Plugin ref selection:
      #   workflow_dispatch → explicit input (default: main)
      #   the-phoenix-project branch → always use the matching branch (coordinated changes)
      #   everything else → main
      - name: Resolve plugin ref
        id: plugin-ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.plugin-ref }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.head_ref || github.ref_name }}" = "the-phoenix-project" ]; then
            echo "ref=the-phoenix-project" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-libraries-gradle-plugin
          ref: ${{ steps.plugin-ref.outputs.ref }}
          path: jenkins-pipeline-shared-libraries-gradle-plugin
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Build
        working-directory: example
        run: ./gradlew build --continue
